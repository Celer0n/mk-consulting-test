name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: self-hosted
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Extract version from Git tag or use 'latest'
      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # Download from S3
      - name: Download from S3
        run: |
          aws s3 cp s3://${{ vars.S3_BUCKET }}/artifacts/my-web-app-${{ steps.version.outputs.version }}.tar my-web-app-${{ steps.version.outputs.version }}.tar

      # Install SSH key for EC2
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.EC2_KNOWN_HOSTS }}

      # Copy files to EC2
      - name: Copy files to EC2
        run: |
          echo "IMAGE_NAME=my-web-app:${{ steps.version.outputs.version }}" > .env
          scp -o StrictHostKeyChecking=no my-web-app-${{ steps.version.outputs.version }}.tar ubuntu@${{ secrets.EC2_HOST }}:/opt/my-web-app-${{ steps.version.outputs.version }}.tar
          scp -o StrictHostKeyChecking=no docker-compose.yml ubuntu@${{ secrets.EC2_HOST }}:/opt/docker-compose.yml
          scp -o StrictHostKeyChecking=no .env ubuntu@${{ secrets.EC2_HOST }}:/opt/.env

      # Deploy to EC2
      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no admin@${{ secrets.EC2_HOST }} << 'EOF'
            # Load Docker image
            docker load -i /opt/my-web-app-${{ steps.version.outputs.version }}.tar
            
            # Run docker-compose
            docker-compose --file /opt/docker-compose.yml up -d
            
            # Clean up
            rm /opt/my-web-app-${{ steps.version.outputs.version }}.tar
            docker image prune -f
          EOF