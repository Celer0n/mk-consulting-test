name: CI Build and Artifact Upload

on:
  push:
    branches: [main]
    paths:
      - "hello.txt"
      - "index.html"
      - "Dockerfile"
      - ".github/workflows/**"

env:
  IMAGE_NAME: yourdockerhubuser/mk-web
  VERSION: ${{ github.run_number }}
  AWS_REGION: us-east-1
  S3_BUCKET: your-ci-artifacts-bucket

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Lint HTML
      run: |
        sudo apt-get update && sudo apt-get install tidy -y
        tidy -e index.html || true  # чтобы просто показать ворнинги

    - name: Archive static files
      run: |
        mkdir artifact
        cp hello.txt index.html artifact/
        tar -czf web-page.tar.gz -C artifact .

    - name: Upload artifact to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: web-page-${{ github.run_number }}
        path: web-page.tar.gz

    - name: Build Docker image
      run: |
        docker build -t $IMAGE_NAME:${VERSION} .

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      run: |
        docker push $IMAGE_NAME:${VERSION}

    - name: Upload artifact to S3
      run: |
        aws s3 cp web-page.tar.gz s3://$S3_BUCKET/artifacts/web-page-${{ github.run_number }}.tar.gz
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}